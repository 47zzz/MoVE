<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoVE — Model Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-alt: #f7f8fa;
      --text: #1d1d2c;
      --text-2: #4a4b65;
      --text-3: #8b8da3;
      --border: #e5e7eb;
      --accent: #4f46e5;
      --accent-light: #ede9fe;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .back-nav {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
    }
    .back-nav a {
      color: var(--text-3);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .back-nav a:hover { color: var(--text); }

    .page-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 28px 36px;
    }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .page-header p {
      color: var(--text-2);
      font-size: 0.92rem;
      margin-top: 8px;
      max-width: 620px;
      line-height: 1.7;
    }

    /* Tabs */
    .tabs-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 28px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-3);
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg-alt); }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Main */
    .main-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 28px 80px;
    }
    .loading { text-align: center; padding: 80px 0; color: var(--text-3); }

    /* ── Table ── */
    .sample-section {
      margin-bottom: 36px;
    }
    .sample-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sample-label .emo-tag {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
    }

    .audio-table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .audio-table {
      border-collapse: separate;     /* required for sticky borders */
      border-spacing: 0;
      width: 100%;
      min-width: 1100px;
    }

    .audio-table th,
    .audio-table td {
      padding: 12px 14px;
      text-align: center;
      vertical-align: middle;
      background: var(--bg);          /* solid bg for sticky cells */
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .audio-table thead th {
      background: var(--bg-alt);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-2);
      line-height: 1.35;
      white-space: nowrap;
    }

    /* Last column — kill right border */
    .audio-table th:last-child,
    .audio-table td:last-child {
      border-right: none;
    }
    /* Last row — kill bottom border */
    .audio-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* ── Sticky LEFT column (Source) ── */
    .sticky-left {
      position: sticky;
      left: 0;
      z-index: 3;
      box-shadow: 6px 0 10px -6px rgba(0,0,0,0.08);
    }
    th.sticky-left { z-index: 4; }

    /* ── Sticky RIGHT column (MoVE Ours) ── */
    .sticky-right {
      position: sticky;
      right: 0;
      z-index: 3;
      background: var(--accent-light) !important;
      box-shadow: -6px 0 10px -6px rgba(0,0,0,0.08);
    }
    th.sticky-right {
      z-index: 4;
      color: var(--accent);
    }

    /* Column widths */
    .col-src  { width: 170px; min-width: 170px; }
    .col-ours { width: 170px; min-width: 170px; }

    .audio-table audio {
      width: 100%;
      min-width: 140px;
      max-width: 170px;
      height: 32px;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 0.78rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <script src="../i18n.js"></script>

  <nav class="back-nav">
    <a href="../"><span data-i18n="nav.back">&larr; Back to Home</span></a>
  </nav>

  <header class="page-header">
    <h1 data-i18n="mc.title">Model Comparison</h1>
    <p data-i18n="mc.desc">Listen and compare speech outputs from different S2ST models across various emotion categories. Each row shows the same source utterance translated by each model.</p>
  </header>

  <div class="tabs-bar" id="tabs"></div>

  <div class="main-area" id="content">
    <div class="loading" id="loading" data-i18n="mc.loading">Loading audio samples...</div>
  </div>

  <footer>
    <p data-i18n="footer.text">MoVE &mdash; Anonymous Submission &middot; Interspeech 2026</p>
  </footer>

  <script>
    // Model display config — order matters (left to right in table)
    const MODELS = [
      { key: 'gen_MoE_top5_attention', name: 'MoVE (Ours)',                  ours: true },
      { key: 'gen_SynStard',           name: 'Kimi + LoRA (SynStard 100h)' },
      { key: 'gen_ExpressiveData',     name: 'Kimi + LoRA (SeamlessAlign 67h)' },
      { key: 'gen_kimi_instruct',      name: 'Kimi-Audio-7B-Instruct' },
      { key: 'gen_openai',             name: 'gpt-4o-audio-preview' },
      { key: 'gen_expressive',         name: 'SeamlessExpressive' },
      { key: 'gen_seamlessm4t',        name: 'SeamlessM4T-Large-v2' },
      { key: 'gen_cascaded',           name: 'Cascaded' },
    ];

    let grouped = {};

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('static/data_manifest.json');
        const manifest = await res.json();
        const raw = manifest.sets || manifest;

        const sets = raw.map(s => ({
          ...s,
          source: s.source ? s.source.replace(/^\.\.\//, '') : null,
          models: Object.fromEntries(
            Object.entries(s.models).map(([k, v]) => [k, v.replace(/^\.\.\//, '')])
          )
        }));

        sets.forEach(s => {
          if (!grouped[s.emotion]) grouped[s.emotion] = [];
          grouped[s.emotion].push(s);
        });

        renderTabs();
        const first = Object.keys(grouped).sort()[0];
        if (first) selectEmotion(first);
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load audio data.';
      }
    });

    function renderTabs() {
      const bar = document.getElementById('tabs');
      Object.keys(grouped).sort().forEach(emo => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.textContent = emo;
        btn.addEventListener('click', () => selectEmotion(emo));
        bar.appendChild(btn);
      });
    }

    function selectEmotion(emo) {
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.textContent === emo));

      const content = document.getElementById('content');
      content.innerHTML = '';

      const srcLabel = window.i18n?.t('mc.source') || 'Source';
      const smpLabel = window.i18n?.t('mc.sample') || 'Sample';

      const sets = grouped[emo] || [];

      // Split into pinned (ours) and scrollable (others)
      const oursModel = MODELS.find(m => m.ours);
      const otherModels = MODELS.filter(m => !m.ours);

      sets.forEach((set, idx) => {
        const section = document.createElement('div');
        section.className = 'sample-section';
        section.style.animation = `fadeIn 0.3s ease ${idx * 0.04}s both`;

        // Label
        section.innerHTML = `
          <div class="sample-label">
            ${smpLabel} ${idx + 1}
            <span class="emo-tag">${set.emotion}</span>
          </div>
        `;

        // Table wrapper
        const wrap = document.createElement('div');
        wrap.className = 'audio-table-wrap';

        const table = document.createElement('table');
        table.className = 'audio-table';

        // ── Thead ──
        const thead = document.createElement('thead');
        let headerHtml = `<tr><th class="sticky-left col-src">${srcLabel}</th>`;
        otherModels.forEach(m => {
          headerHtml += `<th>${m.name}</th>`;
        });
        if (oursModel) {
          headerHtml += `<th class="sticky-right col-ours">${oursModel.name}</th>`;
        }
        headerHtml += '</tr>';
        thead.innerHTML = headerHtml;
        table.appendChild(thead);

        // ── Tbody ──
        const tbody = document.createElement('tbody');
        const row = document.createElement('tr');

        // Source cell (sticky left)
        const srcTd = document.createElement('td');
        srcTd.className = 'sticky-left col-src';
        if (set.source) {
          srcTd.appendChild(makeAudio(set.source));
        } else {
          srcTd.textContent = '—';
        }
        row.appendChild(srcTd);

        // Other model cells (scrollable)
        otherModels.forEach(m => {
          const td = document.createElement('td');
          const url = set.models[m.key];
          if (url) {
            td.appendChild(makeAudio(url));
          } else {
            td.textContent = '—';
          }
          row.appendChild(td);
        });

        // MoVE (Ours) cell (sticky right)
        if (oursModel) {
          const oursTd = document.createElement('td');
          oursTd.className = 'sticky-right col-ours';
          const url = set.models[oursModel.key];
          if (url) {
            oursTd.appendChild(makeAudio(url));
          } else {
            oursTd.textContent = '—';
          }
          row.appendChild(oursTd);
        }

        tbody.appendChild(row);
        table.appendChild(tbody);
        wrap.appendChild(table);
        section.appendChild(wrap);
        content.appendChild(section);
      });
    }

    function makeAudio(url) {
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.preload = 'none';
      audio.src = url;
      return audio;
    }
  </script>

</body>
</html>
