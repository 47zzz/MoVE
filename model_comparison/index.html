<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoVE — Model Comparison Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-alt: #f7f8fa;
      --text: #1d1d2c;
      --text-2: #4a4b65;
      --text-3: #8b8da3;
      --border: #e5e7eb;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #ede9fe;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .back-nav {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
    }
    .back-nav a {
      color: var(--text-3);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .back-nav a:hover { color: var(--text); }

    /* ── Header ── */
    .page-header {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 28px 40px;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .page-header p {
      color: var(--text-2);
      font-size: 0.92rem;
      margin-top: 8px;
      max-width: 560px;
      line-height: 1.7;
    }

    /* ── Emotion Tabs ── */
    .tabs-bar {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px 28px 0;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-3);
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg-alt); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Content ── */
    .main-area {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 28px 64px;
    }

    .loading { text-align: center; padding: 80px 0; color: var(--text-3); font-size: 0.9rem; }

    /* ── Sample Group ── */
    .sample-group {
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .sample-group-header {
      background: var(--bg-alt);
      padding: 12px 20px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sample-group-header .emo-badge {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── Audio Row ── */
    .audio-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .audio-row:last-child { border-bottom: none; }
    .audio-row:hover { background: var(--bg-alt); }
    .audio-row.source-row { background: rgba(79,70,229,0.03); }
    .audio-row.source-row:hover { background: rgba(79,70,229,0.06); }

    .audio-row-label {
      width: 150px;
      flex-shrink: 0;
    }
    .audio-row-label .role {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-3);
    }
    .source-row .audio-row-label .role { color: var(--accent); }
    .audio-row-label .name {
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1px;
    }

    /* ── Player ── */
    .player {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .play-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .play-btn svg { width: 13px; height: 13px; fill: currentColor; }

    .timeline-wrap { flex: 1; min-width: 0; }
    .timeline {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .timeline-progress {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }

    .time-display {
      font-size: 0.72rem;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      min-width: 34px;
      text-align: right;
      font-weight: 500;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 0.78rem;
    }

    @media (max-width: 640px) {
      .audio-row { flex-wrap: wrap; gap: 8px; }
      .audio-row-label { width: 100%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <script src="../i18n.js"></script>

  <nav class="back-nav">
    <a href="../"><span data-i18n="nav.back">&larr; Back to Home</span></a>
  </nav>

  <header class="page-header">
    <h1 data-i18n="mc.title">Model Comparison</h1>
    <p data-i18n="mc.desc">Listen and compare speech outputs from 7 different S2ST models across various emotion categories. Each group shows the source audio and corresponding translations.</p>
  </header>

  <div class="tabs-bar" id="tabs"></div>

  <div class="main-area" id="content">
    <div class="loading" id="loading" data-i18n="mc.loading">Loading audio samples...</div>
  </div>

  <footer>
    <p data-i18n="footer.text">MoVE &mdash; Anonymous Submission &middot; Interspeech 2026</p>
  </footer>

  <script>
    const MODEL_NAMES = {
      'gen_openai': 'OpenAI',
      'gen_seamlessm4t': 'SeamlessM4T',
      'gen_cascaded': 'Cascaded',
      'gen_MoE_top5_attention': 'MoE (Top-5)',
      'gen_ours_100hr': 'MoVE (Ours)',
      'gen_kimi_instruct': 'Kimi',
      'gen_expressive': 'Expressive'
    };

    const MODEL_ORDER = [
      'gen_ours_100hr', 'gen_MoE_top5_attention', 'gen_openai',
      'gen_seamlessm4t', 'gen_kimi_instruct', 'gen_cascaded', 'gen_expressive'
    ];

    let grouped = {};
    let currentAudio = null;
    let currentBtn = null;

    const PLAY = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
    const PAUSE = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('static/data_manifest.json');
        const manifest = await res.json();
        const raw = manifest.sets || manifest;

        const sets = raw.map(s => ({
          ...s,
          source: s.source ? s.source.replace(/^\.\.\//, '') : null,
          models: Object.fromEntries(
            Object.entries(s.models).map(([k, v]) => [k, v.replace(/^\.\.\//, '')])
          )
        }));

        sets.forEach(s => {
          if (!grouped[s.emotion]) grouped[s.emotion] = [];
          grouped[s.emotion].push(s);
        });

        renderTabs();
        const first = Object.keys(grouped).sort()[0];
        if (first) selectEmotion(first);
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load audio data.';
      }
    });

    function renderTabs() {
      const bar = document.getElementById('tabs');
      Object.keys(grouped).sort().forEach(emo => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.textContent = emo;
        btn.addEventListener('click', () => selectEmotion(emo));
        bar.appendChild(btn);
      });
    }

    function selectEmotion(emo) {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === emo));

      const content = document.getElementById('content');
      content.innerHTML = '';

      const srcLabel = window.i18n?.t('mc.source') || 'Source';
      const mdlLabel = window.i18n?.t('mc.model') || 'Model';
      const smpLabel = window.i18n?.t('mc.sample') || 'Sample';

      (grouped[emo] || []).forEach((set, idx) => {
        const group = document.createElement('div');
        group.className = 'sample-group';
        group.style.animation = `fadeIn 0.3s ease ${idx * 0.04}s both`;

        const header = document.createElement('div');
        header.className = 'sample-group-header';
        header.innerHTML = `<span>${smpLabel} ${idx + 1}</span><span class="emo-badge">${set.emotion}</span>`;
        group.appendChild(header);

        const body = document.createElement('div');
        body.className = 'sample-group-body';

        if (set.source) body.appendChild(makeRow(srcLabel, srcLabel, set.source, true));

        const keys = Object.keys(set.models).sort((a, b) => {
          const ia = MODEL_ORDER.indexOf(a), ib = MODEL_ORDER.indexOf(b);
          return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
        });
        keys.forEach(k => {
          const name = MODEL_NAMES[k] || k.replace(/^gen_/, '').replace(/_/g, ' ');
          body.appendChild(makeRow(mdlLabel, name, set.models[k], false));
        });

        group.appendChild(body);
        content.appendChild(group);
      });
    }

    function makeRow(role, name, url, isSource) {
      const row = document.createElement('div');
      row.className = 'audio-row' + (isSource ? ' source-row' : '');
      row.innerHTML = `
        <div class="audio-row-label">
          <div class="role">${role}</div>
          <div class="name">${name}</div>
        </div>
        <div class="player">
          <button class="play-btn"><svg viewBox="0 0 24 24">${PLAY}</svg></button>
          <div class="timeline-wrap"><div class="timeline"><div class="timeline-progress"></div></div></div>
          <div class="time-display">0:00</div>
        </div>`;
      wire(row, url);
      return row;
    }

    function wire(row, url) {
      const audio = new Audio(url);
      const btn = row.querySelector('.play-btn');
      const svg = btn.querySelector('svg');
      const tl = row.querySelector('.timeline');
      const prog = row.querySelector('.timeline-progress');
      const td = row.querySelector('.time-display');

      const fmt = t => isNaN(t) ? '0:00' : `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;

      audio.addEventListener('loadedmetadata', () => td.textContent = fmt(audio.duration));
      audio.addEventListener('timeupdate', () => {
        prog.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
        td.textContent = fmt(audio.currentTime);
      });

      btn.addEventListener('click', () => {
        if (audio.paused) {
          if (currentAudio && currentAudio !== audio) { currentAudio.pause(); if (currentBtn) currentBtn.innerHTML = PLAY; }
          audio.play().catch(() => {});
          svg.innerHTML = PAUSE;
          currentAudio = audio; currentBtn = svg;
        } else {
          audio.pause(); svg.innerHTML = PLAY;
          currentAudio = null; currentBtn = null;
        }
      });

      audio.addEventListener('ended', () => { svg.innerHTML = PLAY; prog.style.width = '100%'; currentAudio = null; currentBtn = null; });

      tl.addEventListener('click', e => {
        if (audio.duration) audio.currentTime = ((e.clientX - tl.getBoundingClientRect().left) / tl.offsetWidth) * audio.duration;
      });
    }
  </script>

</body>
</html>
